name: Cppcheck static analysis

on:
  push:
    branches: [ 'master', 'main', 'release/**' ]
  pull_request:
    branches: [ '*' ]

jobs:
  cppcheck:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/wolfssl/wolfboot-ci-arm:v1.0
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Run cppcheck static analysis
        run: |
          make cppcheck
